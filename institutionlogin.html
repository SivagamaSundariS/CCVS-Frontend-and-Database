<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Institution Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  height: 100vh;
  background: linear-gradient(to right, #667eea, #764ba2);
  display: flex;
  justify-content: center;
  align-items: center;
}
.card {
  width: 400px;
  padding: 30px;
  border-radius: 20px;
  background: white;
}
.back-btn {
  text-decoration: none;
  display: block;
  text-align: center;
  margin-top: 15px;
  color:#333;
}
</style>
</head>

<body>

<div class="card">
<h2 class="text-center">Institution Login</h2>

<form id="form">
<label>Institution Code</label>
<input type="text" id="code" class="form-control mb-2" placeholder=" " required>
<label>Email</label>
<input type="email" id="email" class="form-control mb-2" placeholder="@gmail.com" required>
<label>Password</label>
<input type="password" id="password" class="form-control mb-2" placeholder="" required>

<button class="btn btn-primary w-100">Login</button>
<!-- <a href="index.html" class="back-btn ">⬅ Back</a> -->
<p id="msg" class="text-danger text-center mt-2"></p>
 <a href="login.html" class="back-btn"> ⬅ Back</a> 
</form>
</div>

<script>
document.getElementById("form").onsubmit = async function(e){
e.preventDefault();

let data = {
  instCode: document.getElementById("code").value,
  email: document.getElementById("email").value,
  password: document.getElementById("password").value
};

try{

let res = await fetch("http://localhost:8080/auth/institution/login",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify(data)
});

let msg = await res.text();
console.log("Response:", msg);

// ✅ SUCCESS CHECK
if(msg.toLowerCase().includes("success")){
  
  // ✅ SAVE LOGIN SESSION
  localStorage.setItem("instEmail", data.email);

  alert("Login Success ✅");

  // ✅ REDIRECT
  window.location.href = "institution-dashboard.html";

}else{
  document.getElementById("msg").innerText = msg;
}

}catch(err){
  console.error(err);
  document.getElementById("msg").innerText="Server Error ❌";
}

}
</script>

</body>
</html>
