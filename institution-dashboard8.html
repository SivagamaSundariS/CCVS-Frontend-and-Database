<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Institution Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* BODY */
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: #f5f7fb;
}
/* TOP NAVBAR */
.topbar {
    height: 60px;
    background: linear-gradient(to right, #90EE90);
    color: white;
    display: flex;
    align-items: center;
    justify-content: space-between; 
    padding: 0 20px;
    font-size: 18px;
    font-weight: 600;
}

/* LOGOUT */
.logout-btn {
    background: lightslategray;
    border: none;
    color: white;
    padding: 5px 12px;
    border-radius: 8px;
    cursor: pointer;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    height: 100vh;
    position: fixed;
    top: 60px;
    left: 0;
    background: linear-gradient(to bottom,rgb(56, 61, 56));
    padding-top: 20px;
}

.sidebar a {
    display: block;
    color: white;
    padding: 12px 20px;
    text-decoration: none;
}

.sidebar a:hover {
    background: rgba(255,255,255,0.15);
}

/* CONTENT */
.content {
    margin-left: 220px;
    margin-top: 10px;
    padding: 20px;
    /* min-height:calc(100vh - 60px) ; */
    background: #f5f7fa;
} 
  .conten {
    margin-top: 0px;
    padding: 20px;
} 
 .center-box {
    max-width: 500px;
    margin: auto;
    margin-top: 40px;
}

/* CARD */
.card {
    width: 450px;
    border-radius: 15px;
}
/* SMALL BUTTON */
.btn-sm {
    padding: 5px 12px;
}

/* QR */
.qr-img {
    width: 100px;
}

/* HIDE */
.hidden {
    display: none;
}

</style>
</head>

<body>

<!-- TOP NAV -->
<div class="topbar">
     Institution Dashboard
    <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
    <a href="#" onclick="showSection('studentForm')"> Student Registration</a>
    <a href="#" onclick="loadStudents()"> Student Details</a>
    <a href="#" onclick="loadInstitution()"> Institution Details</a>
</div>

<!-- CONTENT -->
<!-- <div class="content"> -->
    <!-- CONTENT -->
<div class="col-md-10 content" >

<div id="studentForm" class="center-box">
<h4 class=" text-center">Student Registration</h4>
<!-- ================= STUDENT FORM ================= -->
<div  class="card p-3">
<!-- <div class="center-box"> -->


<div class="mb-1">
    <!-- <label class="form-label">Name</label> -->
<label>Name</label>
<input type="text" id="name" class="form-control mb-2">
</div>

<label>Register No</label>
<input type="text" id="regNo" class="form-control mb-2">

<label>Date of Birth</label>
<input type="date" id="dob" class="form-control mb-2">

<label>Email</label>
<input type="email" id="email" class="form-control mb-2">

<label>Department</label>
<input type="text" id="department" class="form-control mb-2">

<div class="d-flex justify-content-between mt-2">
    <button class="btn btn-success btn-sm" onclick="saveStudent()">Save</button>
    <button class="btn btn-info btn-sm" onclick="openCertificate()">Next</button>
</div>

</div>

<!-- ================= CERTIFICATE ================= -->
 
<div id="certificateForm" class="card p-3 hidden">

<h6 class="mb-3 text-center">Certificate Upload</h6>

<label>Course</label>
<input type="text" id="course" class="form-control mb-2">

<label>Issue Date</label>
<input type="date" id="issueDate" class="form-control mb-2">

<label>Upload File</label>
<input type="file" id="file" class="form-control mb-2">

<button class="btn btn-primary btn-sm mt-2 w-100" onclick="uploadCertificate()">Submit</button>

<h6 id="msg" class="text-success mt-2 text-center"></h6>

<div id="preview" class="mt-2"></div>

</div>

</div>

<!-- ================= STUDENT DETAILS ================= -->
 
<div id="studentDetails" class="hidden ">

<h5>Student Details</h5>

<table class="table table-bordered">
<thead>
<tr>
<th>S.No</th>
<th>Name</th>
<th>Reg No</th>
<th>Course</th>
<th>QR</th>
<th>Hash</th>
<th>Download</th>
</tr>
</thead>

<tbody id="studentTable"></tbody>

</table>

</div>
 

<!-- ================= INSTITUTION DETAILS ================= -->
<div id="institutionDetails" class="card p-4 hidden">

<h5>Institution Details</h5>

<p><b>Name:</b> <span id="instName"></span></p>
<p><b>Code:</b> <span id="instCode"></span></p>
<p><b>Address:</b> <span id="instAddress"></span></p>
<p><b>Email:</b> <span id="instEmail"></span></p>

</div>

</div>


<script>

let currentRegNo = "";

// NAVIGATION
function showSection(id){
    document.getElementById("studentForm").classList.add("hidden");
    document.getElementById("certificateForm").classList.add("hidden");
    document.getElementById("studentDetails").classList.add("hidden");
    document.getElementById("institutionDetails").classList.add("hidden");

    document.getElementById(id).classList.remove("hidden");
    // window.scrollTo(0,0);
}

// SAVE STUDENT
function saveStudent(){

    const student = {
        name: document.getElementById("name").value,
        regNo: document.getElementById("regNo").value,
        dob: document.getElementById("dob").value,
        email: document.getElementById("email").value,
        department: document.getElementById("department").value,
        institutionEmail: localStorage.getItem("instEmail")
    };

    fetch("http://localhost:8080/api/student/save",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(student)
    })
    .then(res=>res.json())
    .then(data=>{
        alert("Student Saved ✅");
        currentRegNo = data.regNo;
    });
}

// NEXT BUTTON
function openCertificate(){
    if(!currentRegNo){
        alert("First Save Student!");
        return;
    }
     showSection("certificateForm");
 }

// UPLOAD CERTIFICATE
function uploadCertificate(){

    let formData = new FormData();
    formData.append("file", document.getElementById("file").files[0]);
    formData.append("regNo", currentRegNo);
    formData.append("course", document.getElementById("course").value);
    formData.append("issueDate", document.getElementById("issueDate").value);

    fetch("http://localhost:8080/api/certificate/upload",{
        method:"POST",
        body:formData
    })
    .then(res=>res.json())
    .then(data=>{

        document.getElementById("msg").innerText="✅ Successfully Uploaded";

        document.getElementById("preview").innerHTML = `
            <div class="card p-2 mt-2">
                <p><b>Name:</b> ${data.student.name}</p>
                <p><b>RegNo:</b> ${data.student.regNo}</p>
                <p><b>Course:</b> ${data.course}</p>
                <img src="data:image/png;base64,${data.qrCode}" class="qr-img"/>
                <p><b>Hash:</b> ${data.hashValue}</p>
            </div>
        `;
    });
}

// LOAD STUDENTS
function loadStudents(){

    showSection("studentDetails");

    let email = localStorage.getItem("instEmail");

    fetch("http://localhost:8080/api/student/byInstitution?email="+email)
    .then(res=>res.json())
    .then(data=>{

        let table = document.getElementById("studentTable");
        table.innerHTML="";

        let i=1;

        data.forEach(st=>{

            fetch("http://localhost:8080/api/certificate/byStudent/"+st.regNo)
            .then(res=>res.json())
            .then(certList=>{

                let cert = certList[0];

                table.innerHTML += `
                <tr>
                    <td>${i++}</td>
                    <td>${st.name}</td>
                    <td>${st.regNo}</td>
                    <td>${cert?cert.course:"-"}</td>
                    <td>${cert?`<img src="data:image/png;base64,${cert.qrCode}" class="qr-img"/>`:"-"}</td>
                    <td>${cert?cert.hashValue:"-"}</td>
                    <td><a href="#" onclick="downloadCert('${cert?.id}')">Download</a></td>
                </tr>
                `;
            });

        });

    });
}

// DOWNLOAD
function downloadCert(id){
    window.open("http://localhost:8080/api/certificate/download/"+id);
}

// LOAD INSTITUTION
function loadInstitution(){

    showSection("institutionDetails");

    let email = localStorage.getItem("instEmail");

    fetch("http://localhost:8080/api/institution/byEmail?email="+email)
    .then(res=>res.json())
    .then(data=>{
        document.getElementById("instName").innerText=data.institutionName;
        document.getElementById("instCode").innerText=data.instCode;
        document.getElementById("instAddress").innerText=data.address;
        document.getElementById("instEmail").innerText=data.email;
    });
}

// LOGOUT
function logout(){
    localStorage.clear();
    window.location.href = "login.html";
}

</script>

</body>
</html>
