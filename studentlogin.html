<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; }
        .hidden { display: none; }
        .card { border-radius: 12px; border: none; }
        .navbar-custom { background: #2c3e50; color: white; padding: 1rem; }
        /* Card */
.loginForm {
  width: 100%;
  max-width: 400px;
  padding: 30px;
  border-radius: 20px;
  background: rgba(255, 255, 255, 0.2);
  backdrop-filter: blur(15px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.2);
}
.back-btn {
  text-decoration: none;
  display: block;
  text-align: center;
  margin-top: 15px;
  color:#333;
}
    </style>
</head>
<body>

<div id="loginForm" class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow p-4">
                <h3 class="text-center mb-4">Student Login</h3>
                <div class="mb-3">
                    <label>Email ID</label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Date of Birth</label>
                    <input type="date" id="dob" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Register Number</label>
                    <input type="text" id="regNo" class="form-control" required>
                </div>
                <button onclick="loginStudent()" class="btn btn-primary w-100">Login</button><br>
            <!-- <p id="msg" class="text-danger text-center mt-2"></p> -->
            <a href="login.html" class="back-btn">⬅ Back</a>
            </div>
        </div>
    </div>
</div>

<div id="dashboard" class="hidden">
    <nav class="navbar-custom d-flex justify-content-between">
        <h4 class="m-0">Student Dashboard</h4>
        <button onclick="location.reload()" class="btn btn-outline-light btn-sm">Logout</button>
    </nav>

    <div class="container mt-5">
        <div class="card shadow p-4">
            <h5>My Certificate Details</h5>
            <hr>
            <div class="table-responsive">
                <table class="table table-bordered align-middle text-center">
                    <thead class="table-dark">
                        <tr>
                            <th>Name</th>
                            <th>Reg No</th>
                            <th>Folio No</th>
                            <th>QR Code</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="studentData">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    async function loginStudent() {
        // Input values vaangugirom
        const email = document.getElementById("email").value;
        const dob = document.getElementById("dob").value;
        const regNo = document.getElementById("regNo").value;

        if (!email || !dob || !regNo) {
            alert("Ellaa details-aiyum fill pannunga!");
            return;
        }

        // Login details-ai oru object-ah maathugirom
        const loginData = {
            email: email,
            dob: dob,
            regNo: regNo
        };

        try {
            // BACKEND API CALL
            const response = await fetch("http://localhost:8080/auth/student/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(loginData)
            });

            if (response.ok) {
                const student = await response.json();
                showDashboard(student);
            } else {
                alert("Login Failed! Details check pannunga.");
            }
        } catch (error) {
            console.error("Error:", error);
            alert("Server connection error!");
        }
    }
async function showDashboard(student) {

document.getElementById("loginForm").classList.add("hidden");
document.getElementById("dashboard").classList.remove("hidden");

const tbody = document.getElementById("studentData");

// certificate fetch
let res = await fetch(`http://localhost:8080/auth/certificate/byRegNo?regNo=${student.regNo}`);

let certs = await res.json();

let html="";

certs.forEach(c=>{

html+=`
<tr>
<td>${c.name}</td>
<td>${c.regNo}</td>
<td>${c.folioNo}</td>

<td>
<img src="data:image/png;base64,${c.qrCodePath}" width="100" alt="QR"/>
</td>

<td>
<button class="btn btn-success btn-sm" onclick="downloadCert(${c.id})">
Download Certificate
</button>
</td>

</tr>
`;

});

tbody.innerHTML=html;

}
// 3. DOWNLOAD LOGIC (Crucial Fix)
function downloadCert(id) {
    if (!id) {
        alert("Certificate ID missing!");
        return;
    }
    // Direct redirection triggers the Spring Boot 'attachment' response
    window.location.href = `http://localhost:8080/auth/certificate/download/${id}`;
}
</script>
 
</script>

</body>
</html>
